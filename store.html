<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunira Store | متجر لونيرا</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; color: #333; margin: 0; padding: 0; text-align: center; }
        header { background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); color: white; padding: 40px 20px; font-size: 28px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .container { padding: 30px 15px; max-width: 600px; margin: 0 auto; }
        .welcome-msg { font-size: 22px; color: #444; margin-bottom: 10px; font-weight: 600; }
        .sub-msg { font-size: 16px; color: #777; margin-bottom: 30px; }
        .product-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #eee; margin-bottom: 20px; transition: transform 0.3s; }
        .product-card:hover { transform: translateY(-5px); }
        .product-title { font-size: 20px; font-weight: bold; color: #ff758c; margin-bottom: 10px; }
        .product-desc { font-size: 14px; color: #666; line-height: 1.6; }
        footer { margin-top: 5px; color: #aaa; font-size: 12px; padding: 20px; }
    </style>
</head>
<body>

    <header>
        ✨ Lunira Store ✨
    </header>

    <div class="container">
        <div class="welcome-msg">مرحباً بكِ في متجر لونيرا الفخم! 💖</div>
        <div class="sub-msg">الموقع قيد التجهيز بكل حب، انتظروا تشكيلتنا الإبداعية قريباً جداً...</div>

        <div class="product-card">
            <div class="product-title">قريباً.. أحدث صيحات الموضة والجمال 🛍️</div>
            <div class="product-desc">نعمل خلف الكواليس لنقدم لكِ تجربة تسوق ساحرة تليق بجمالك. كوني بالقرب!</div>
        </div>
    </div>

    <footer>
        &copy; 2026 Lunira Store. جميع الحقوق محفوظة.
    </footer>

</body>
</html>
